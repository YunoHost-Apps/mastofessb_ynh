#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "mastofessb"
name = "Masto-FE (🦥 flavour)"
description.en = "Mastodon-like interface for GoToSocial, based on IceShrimp's Masto-FE Standalone"
description.fr = "Interface à la Mastodon pour GoToSocial, basé sur Masto-FE Standalone d'IceShrimp"

version = "2026.07.03~ynh1"

maintainers = ["trendless"]

[upstream]
license = "AGPL-3.0"
demo = "https://masto-fe.superseriousbusiness.org/"
code = "https://codeberg.org/superseriousbusiness/masto-fe-standalone"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "3G"
ram.build = "2G"
ram.runtime = "300M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

        [resources.sources.main]
        url = "https://codeberg.org/superseriousbusiness/masto-fe-standalone/archive/c6ec86442c973c8e310d53f4418b518facc40850.tar.gz"
        sha256 = "afe58d225bf8e884904086e88189bc70a16f5a488b6070b223f28e25e0f29bd9"

        autoupdate.strategy = "latest_forgejo_commit"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = ["yarn"]

    [resources.nodejs]
    version = "20"
